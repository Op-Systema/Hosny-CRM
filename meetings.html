<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>الاجتماعات | Hosny CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="meetings">
  <main id="pageContent" class="page-content">
    <div class="page-header">
      <div>
        <p class="eyebrow">إدارة المواعيد</p>
        <h1>الاجتماعات</h1>
      </div>
      <button id="addMeetingBtn" class="primary-btn" type="button">إضافة اجتماع</button>
    </div>
    <section class="panel">
      <div id="meetingsList" class="stack-list"></div>
    </section>
  </main>
  <div id="meetingModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <div class="panel-head">
        <h2 id="meetingModalTitle">إضافة اجتماع</h2>
        <button class="icon-btn" data-close-modal type="button">×</button>
      </div>
      <form id="meetingForm" class="form-grid modal-form">
        <input type="hidden" name="id">
        <label class="full">المستثمر<select name="investor_id" required></select></label>
        <label>موعد الاجتماع<input name="meeting_date" type="datetime-local" required></label>
        <label class="full">ملاحظات<textarea name="notes"></textarea></label>
        <label class="full">الاعتراضات<textarea name="objections"></textarea></label>
        <label class="full">الخطوة القادمة<textarea name="next_step"></textarea></label>
        <button class="primary-btn full" type="submit">حفظ الاجتماع</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/meetings.js"></script>
</body>
</html>
