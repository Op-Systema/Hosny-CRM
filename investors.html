<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>المستثمرون | Hosny CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="investors">
  <main id="pageContent" class="page-content">
    <div class="page-header">
      <div>
        <p class="eyebrow">إدارة العلاقات</p>
        <h1>المستثمرون</h1>
      </div>
      <button id="addInvestorBtn" class="primary-btn" type="button">إضافة مستثمر</button>
    </div>
    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="بحث بالاسم أو الهاتف أو المدينة">
      <select id="cityFilter"><option value="">كل المدن</option></select>
      <select id="stageFilter"><option value="">كل المراحل</option></select>
      <select id="salesFilter" class="admin-only"><option value="">كل مسؤولي المبيعات</option></select>
    </section>
    <section class="panel">
      <div class="responsive-table">
        <table>
          <thead>
            <tr>
              <th>المستثمر</th>
              <th>المدينة</th>
              <th>الميزانية</th>
              <th>المرحلة</th>
              <th>الدرجة</th>
              <th>المسؤول</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="investorsTable"></tbody>
        </table>
      </div>
      <div id="investorsCards" class="mobile-cards"></div>
      <div id="emptyState" class="empty-state hidden">لا توجد بيانات مطابقة.</div>
    </section>
  </main>
  <div id="investorModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <div class="panel-head">
        <h2 id="modalTitle">إضافة مستثمر</h2>
        <button class="icon-btn" data-close-modal type="button">×</button>
      </div>
      <form id="investorForm" class="form-grid modal-form">
        <input type="hidden" name="id">
        <label>الاسم الكامل<input name="full_name" required></label>
        <label>الهاتف<input name="phone" placeholder="+9665xxxxxxxx"></label>
        <label>البريد الإلكتروني<input name="email" type="email"></label>
        <label>المدينة<input name="city"></label>
        <label>الميزانية<input name="budget" type="number" min="0" step="1000"></label>
        <label>مدينة الاهتمام<input name="interested_city"></label>
        <label>مصدر العميل<input name="lead_source"></label>
        <label>المرحلة<select name="pipeline_stage"></select></label>
        <label class="admin-only">مسؤول المبيعات<select name="assigned_to"></select></label>
        <label class="full">الخلفية التجارية<textarea name="business_background"></textarea></label>
        <label class="full">ملاحظات<textarea name="notes"></textarea></label>
        <button class="primary-btn full" type="submit">حفظ البيانات</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/investors.js"></script>
</body>
</html>
