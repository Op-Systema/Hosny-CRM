<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>لوحة التحكم | Hosny CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="dashboard">
  <main id="pageContent" class="page-content">
    <div class="page-header">
      <div>
        <p class="eyebrow">نظرة عامة</p>
        <h1>لوحة التحكم</h1>
      </div>
    </div>
    <section id="statsGrid" class="stats-grid"></section>
    <section class="content-grid two">
      <article class="panel">
        <div class="panel-head">
          <h2>موجز ذكي</h2>
        </div>
        <p id="aiBriefing" class="briefing">جاري تجهيز الملخص...</p>
      </article>
      <article class="panel">
        <div class="panel-head">
          <h2>أهم الفرص</h2>
          <a class="text-link" href="investors.html">عرض الكل</a>
        </div>
        <div id="hotInvestors" class="stack-list"></div>
      </article>
    </section>
    <section class="content-grid two">
      <article class="panel chart-panel">
        <h2>المستثمرون حسب المرحلة</h2>
        <canvas id="stageChart"></canvas>
      </article>
      <article class="panel chart-panel">
        <h2>العملاء حسب المصدر</h2>
        <canvas id="sourceChart"></canvas>
      </article>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/dashboard.js"></script>

</html>
