<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>الإعدادات | Hosny CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="settings">
  <main id="pageContent" class="page-content">
    <div class="page-header">
      <div>
        <p class="eyebrow">حسابي</p>
        <h1>الإعدادات</h1>
      </div>
    </div>
    <section class="content-grid two">
      <article class="panel">
        <div class="panel-head"><h2>الملف الشخصي</h2></div>
        <form id="profileForm" class="form-grid">
          <label>الاسم الكامل<input name="full_name" required></label>
          <label>الهاتف<input name="phone"></label>
          <button class="primary-btn full" type="submit">حفظ التعديلات</button>
        </form>
      </article>
      <article class="panel">
        <div class="panel-head"><h2>الأمان</h2></div>
        <p class="muted">لتغيير كلمة المرور استخدم صفحة استعادة كلمة المرور وسيصلك رابط آمن على بريدك الإلكتروني.</p>
        <div class="actions-row">
          <a class="secondary-btn" href="auth/forgot-password.html">تغيير كلمة المرور</a>
          <button id="settingsLogoutBtn" class="danger-btn" type="button">تسجيل الخروج</button>
        </div>
      </article>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
