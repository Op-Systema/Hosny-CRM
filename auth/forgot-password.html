<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>استعادة كلمة المرور | Hosny CRM</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
  <section class="auth-card">
    <div class="auth-logo">
      <img class="brand-logo" src="../assets/hosny-logo.png" alt="Hosny CRM">
      <div>
        <h1>استعادة كلمة المرور</h1>
        <p>سنرسل رابط إعادة التعيين إلى بريدك</p>
      </div>
    </div>
    <form id="forgotForm" class="form-grid">
      <label>البريد الإلكتروني
        <input type="email" name="email" required autocomplete="email">
      </label>
      <button class="primary-btn" type="submit">إرسال الرابط</button>
      <p id="authMessage" class="form-message"></p>
    </form>
    <div class="auth-links">
      <a href="login.html">العودة لتسجيل الدخول</a>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
