<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إنشاء حساب | Hosny CRM</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
  <section class="auth-card">
    <div class="auth-logo">
      <img class="brand-logo" src="../assets/hosny-logo.png" alt="Hosny CRM">
      <div>
        <h1>حساب جديد</h1>
        <p>أول حساب يتم إنشاؤه يصبح مدير النظام</p>
      </div>
    </div>
    <form id="signupForm" class="form-grid">
      <label>الاسم الكامل
        <input type="text" name="full_name" required autocomplete="name">
      </label>
      <label>البريد الإلكتروني
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label>كلمة المرور
        <input type="password" name="password" required minlength="6" autocomplete="new-password">
      </label>
      <label>تأكيد كلمة المرور
        <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password">
      </label>
      <button class="primary-btn" type="submit">إنشاء الحساب</button>
      <p id="authMessage" class="form-message"></p>
    </form>
    <div class="auth-links">
      <a href="login.html">لديك حساب؟ تسجيل الدخول</a>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
